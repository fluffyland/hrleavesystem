<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeaveDesk — Leave Management</title>
<style>
:root{
  --bg:#f2f4f7; --surface:#ffffff; --line:#dfe4ea; --ink:#1c2530; --muted:#5d6a79;
  --accent:#0c6b60; --accent-ink:#ffffff; --accent-soft:#e2f0ed; --accent-line:#b8dcd5;
  --good:#1a7a4a; --good-soft:#e2f2e8;
  --warn:#96590e; --warn-soft:#fcefd9;
  --bad:#b23a31; --bad-soft:#fbe6e4;
  --info:#6a4da3; --info-soft:#eee8f8;
  --gray-soft:#e9edf2;
  --shadow:0 1px 2px rgba(20,30,40,.06),0 4px 14px rgba(20,30,40,.05);
  --r:10px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#10161d; --surface:#1a222c; --line:#2b3644; --ink:#e7edf3; --muted:#95a2b2;
    --accent:#37a08f; --accent-ink:#08211d; --accent-soft:#15352f; --accent-line:#26584f;
    --good:#4cbf82; --good-soft:#173226;
    --warn:#e0a34e; --warn-soft:#38290f;
    --bad:#e57a70; --bad-soft:#3a1c19;
    --info:#ab90e0; --info-soft:#291f3d;
    --gray-soft:#232d39;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.3);
  }
}
:root[data-theme="light"]{
  --bg:#f2f4f7; --surface:#ffffff; --line:#dfe4ea; --ink:#1c2530; --muted:#5d6a79;
  --accent:#0c6b60; --accent-ink:#ffffff; --accent-soft:#e2f0ed; --accent-line:#b8dcd5;
  --good:#1a7a4a; --good-soft:#e2f2e8; --warn:#96590e; --warn-soft:#fcefd9;
  --bad:#b23a31; --bad-soft:#fbe6e4; --info:#6a4da3; --info-soft:#eee8f8;
  --gray-soft:#e9edf2;
  --shadow:0 1px 2px rgba(20,30,40,.06),0 4px 14px rgba(20,30,40,.05);
}
:root[data-theme="dark"]{
  --bg:#10161d; --surface:#1a222c; --line:#2b3644; --ink:#e7edf3; --muted:#95a2b2;
  --accent:#37a08f; --accent-ink:#08211d; --accent-soft:#15352f; --accent-line:#26584f;
  --good:#4cbf82; --good-soft:#173226; --warn:#e0a34e; --warn-soft:#38290f;
  --bad:#e57a70; --bad-soft:#3a1c19; --info:#ab90e0; --info-soft:#291f3d;
  --gray-soft:#232d39;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
}
button{font:inherit;cursor:pointer;border:none;border-radius:8px}
input,select,textarea{
  font:inherit;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-width:100%;
}
select{padding-right:28px;text-overflow:ellipsis} /* keep long option text clear of the dropdown arrow */
input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible,a:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}
a{color:var(--accent)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

.wrap{max-width:1060px;margin:0 auto;padding:0 16px}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar .wrap{display:flex;align-items:center;gap:12px;height:56px}
.logo{display:flex;align-items:baseline;gap:8px;font-weight:700;font-size:17px;letter-spacing:.2px}
.logo .beta{font-size:11px;font-weight:600;color:var(--warn);background:var(--warn-soft);padding:1px 8px;border-radius:99px;letter-spacing:.08em}
.spacer{flex:1}
.userchip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.iconbtn{background:transparent;color:var(--muted);padding:6px 10px;border-radius:8px;position:relative}
.iconbtn:hover{background:var(--gray-soft);color:var(--ink)}
.badge{position:absolute;top:0;right:2px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:0 5px;line-height:15px}
.nav{background:var(--surface);border-bottom:1px solid var(--line)}
.nav .wrap{display:flex;gap:2px;overflow-x:auto}
.nav button{background:transparent;color:var(--muted);padding:11px 14px;border-radius:0;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.nav button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.nav button:hover{color:var(--ink)}
.nav .cnt{display:inline-block;min-width:18px;text-align:center;background:var(--bad);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:0 5px;margin-left:6px;line-height:17px}

main{padding:22px 0 60px}
h2{font-size:19px;margin:0 0 4px}
h3{font-size:15px;margin:0 0 10px}
.sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.stack{display:flex;flex-direction:column;gap:16px}

.balgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.bal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px}
.bal .t{font-size:13px;font-weight:600}
.bal .en{font-size:11px;color:var(--muted);letter-spacing:.04em}
.bal .n{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;margin:2px 0 0;color:var(--accent)}
.bal .n small{font-size:13px;color:var(--muted);font-weight:500}
.bal .d{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

.pill{display:inline-block;font-size:12px;font-weight:600;border-radius:99px;padding:2px 10px;white-space:nowrap}
.st-pending{background:var(--warn-soft);color:var(--warn)}
.st-approved{background:var(--good-soft);color:var(--good)}
.st-rejected{background:var(--bad-soft);color:var(--bad)}
.st-returned{background:var(--warn-soft);color:var(--warn)}
.st-withdrawn{background:var(--gray-soft);color:var(--muted)}
.st-cancel_requested{background:var(--info-soft);color:var(--info)}
.st-cancelled{background:var(--gray-soft);color:var(--muted)}

.tablebox{overflow-x:auto}
.tablebox table.nowrap td,.tablebox table.nowrap th{white-space:nowrap}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th{color:var(--muted);font-weight:600;text-align:left;font-size:12px;letter-spacing:.03em}
th,td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr.rowlink{cursor:pointer}
tr.rowlink:hover td{background:var(--gray-soft)}
td.num{font-variant-numeric:tabular-nums}

.btn{background:var(--accent);color:var(--accent-ink);padding:9px 18px;font-weight:600}
.btn:hover{filter:brightness(1.07)}
.btn.sec{background:var(--gray-soft);color:var(--ink)}
.btn.good{background:var(--good);color:#fff}
.btn.warn{background:var(--warn);color:#fff}
.btn.bad{background:var(--bad);color:#fff}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent-line)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600}
.field .hint{font-size:12px;color:var(--muted)}
.req{color:#e5484d;font-weight:700;margin-left:2px}
.frow{display:flex;gap:14px;flex-wrap:wrap}
.frow .field{flex:1;min-width:160px}
.check{display:flex;align-items:center;gap:8px;font-size:13.5px}
.check input{width:16px;height:16px}
.hdlist{display:flex;flex-direction:column;gap:6px}
.hdrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--gray-soft);border-radius:8px;padding:6px 10px;font-size:13.5px}
.hdrow select{max-width:190px;padding:5px 8px}

.callout{border-radius:var(--r);padding:12px 16px;font-size:13.5px;border:1px solid}
.callout.acc{background:var(--accent-soft);border-color:var(--accent-line);color:var(--ink)}
.callout.warn{background:var(--warn-soft);border-color:var(--warn);color:var(--ink)}

.applist{display:flex;flex-direction:column;gap:12px}
.appcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.appcard .hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.appcard .hd b{font-size:15.5px}
.typechip{background:var(--gray-soft);border-radius:6px;padding:2px 9px;font-size:12px;color:var(--muted);white-space:nowrap}
.appcard .when{font-size:15px;margin:2px 0;font-variant-numeric:tabular-nums}
.appcard .why{font-size:13.5px;margin:0 0 2px;overflow-wrap:anywhere}
.appcard .metarow{font-size:12.5px;color:var(--muted);margin:2px 0 6px}
.hchip{display:inline-block;padding:2px 8px;border:1px solid var(--line);border-radius:999px;font-size:12px;margin:1px 4px 1px 0;background:var(--bg);white-space:nowrap;font-variant-numeric:tabular-nums}
.meta{color:var(--muted);font-size:13px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:13.5px;margin:8px 0}
.kv dt{color:var(--muted)}
.kv dd{margin:0}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.steps{display:flex;flex-direction:column;gap:6px;margin:10px 0;font-size:13.5px}
.step{display:flex;align-items:center;gap:8px}
.step .dot{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none}
.step.ok .dot{background:var(--good-soft);color:var(--good)}
.step.now .dot{background:var(--warn-soft);color:var(--warn)}
.step.off .dot{background:var(--gray-soft);color:var(--muted)}
.step.no .dot{background:var(--bad-soft);color:var(--bad)}

.timeline{list-style:none;margin:10px 0 0;padding:0;font-size:13px}
.timeline li{padding:6px 0 6px 18px;border-left:2px solid var(--line);position:relative}
.timeline li::before{content:"";position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.timeline .tm{color:var(--muted);font-size:12px}

.modalback{position:fixed;inset:0;background:rgba(10,15,20,.45);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto}
.modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);max-width:620px;width:100%;padding:22px}
.modal .hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.modal .hd h3{flex:1;margin:0;font-size:17px}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tabs button{background:var(--gray-soft);color:var(--muted);padding:7px 14px;font-weight:600;font-size:13px;border-radius:99px}
.tabs button.on{background:var(--accent);color:var(--accent-ink)}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 16px}
.loginbox{max-width:390px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:28px 26px}
.loginbox h1{font-size:26px;margin:0 0 4px;letter-spacing:.2px}
.loginbox .tag{color:var(--muted);margin:0 0 22px;font-size:14px}
.rolechip{font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 7px;letter-spacing:.05em;flex:none}
.rl-employee{background:var(--gray-soft);color:var(--muted)}
.rl-approver{background:var(--accent-soft);color:var(--accent)}
.rl-hr{background:var(--info-soft);color:var(--info)}
.rl-admin{background:var(--warn-soft);color:var(--warn)}
.footnote{color:var(--muted);font-size:12.5px;margin-top:20px;line-height:1.7}

.mailbtn{position:relative;z-index:41}
.mailbackdrop{position:fixed;inset:0;z-index:39;background:transparent}
.mailpanel{position:absolute;right:0;top:44px;width:min(360px,88vw);background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:40;max-height:min(420px,calc(100vh - 70px));overflow-y:auto}
.mailpanel .mi{padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px}
.mailpanel .mi b{display:block;font-size:13px}
.mailpanel .mi .tm{color:var(--muted);font-size:11.5px}
.mailpanel .mi p{margin:4px 0 0;color:var(--muted);white-space:pre-wrap}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;box-shadow:var(--shadow);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
#toast.show{opacity:1}
.calhead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.calhead h3{margin:0;font-size:16px;min-width:150px;text-align:center;font-variant-numeric:tabular-nums}
.calbox{overflow-x:auto}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;min-width:700px}
.cal .dow{font-size:11.5px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.05em;padding:4px 0}
.cal .day{background:var(--surface);border:1px solid var(--line);border-radius:8px;min-height:78px;padding:4px 5px;font-size:12px}
.cal .day.off{background:var(--gray-soft);border-color:transparent}
.cal .day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal .dnum{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;display:flex;justify-content:space-between}
.cal .dnum .ph{color:var(--warn);font-weight:600;font-size:10.5px}
.cal .phname{color:var(--warn);font-size:10px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dangerzone{border:1px solid var(--bad);border-radius:10px;padding:10px 12px;margin-top:14px;background:color-mix(in srgb,var(--bad) 6%,var(--surface))}
.dangerzone h4{margin:0 0 4px;color:var(--bad);font-size:13px}
.dangerzone p{margin:0 0 8px;font-size:12.5px;color:var(--muted)}
.cal .chips{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.lvchip{border-radius:5px;padding:1px 5px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lvchip.ap{background:var(--accent);color:var(--accent-ink)}
.lvchip.pd{background:var(--gray-soft);color:var(--muted);opacity:.65;border:1px dashed var(--line)}
.legend{display:flex;gap:16px;align-items:center;font-size:12.5px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.ackbox{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;font-weight:600;margin-top:10px}
.ackbox input{width:16px;height:16px;margin-top:3px;flex:none}
.conflictlist{margin:8px 0 0;padding:0;list-style:none;font-size:13px}
.conflictlist li{display:grid;grid-template-columns:minmax(64px,max-content) 1fr auto;gap:10px;align-items:center;padding:3px 0}
.conflictlist .cldate{font-variant-numeric:tabular-nums;white-space:nowrap}
.phchips{display:flex;flex-wrap:wrap;gap:6px}
.phchips span{background:var(--gray-soft);border-radius:6px;padding:2px 9px;font-size:12.5px;font-variant-numeric:tabular-nums}
.empty{color:var(--muted);font-size:14px;padding:26px 0;text-align:center}

/* Phone layout: tighter cards, full-width tap targets */
@media (max-width:560px){
  .wrap{padding:0 10px}
  input,select,textarea{font-size:16px}  /* iOS Safari: fields <16px auto-zoom on focus; 16px stops the login-page zoom */
  /* Header: let it wrap to two tidy rows instead of a fixed row that overflows */
  .topbar .wrap{height:auto;min-height:56px;flex-wrap:wrap;gap:6px 8px;padding-top:8px;padding-bottom:8px}
  .logo{flex:1 1 100%;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15.5px}
  .spacer{display:none}
  .userchip{flex:1;min-width:0;font-size:12px}
  .iconbtn{padding:6px 8px}
  .iconbtn .lbl{display:none}   /* 🔑 Password → just 🔑 on phones */
  .appcard{padding:12px}
  .appcard .actions .btn{flex:1;padding:10px 6px;text-align:center}
  .callout{padding:10px}
  .kv{grid-template-columns:1fr;gap:1px 0}
  .kv dt{margin-top:6px}
  .conflictlist li{grid-template-columns:minmax(56px,max-content) 1fr auto;gap:7px}
  .modal{padding:14px}
}
</style>
</head>

<script>
"use strict";
/* ============ Production build — talks to Supabase (real login + database) ============ */
const SUPABASE_URL = "https://aypyolzkdupkpefpxius.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5cHlvbHprZHVwa3BlZnB4aXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDM0MTMsImV4cCI6MjA5OTA3OTQxM30.hoRS_j8yBTJkcQBG_IZRuVgDD06ZGCRam8lqz923f6s";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* db is an in-memory cache hydrated from Supabase; renderers read from it unchanged. */
let db, me = null, view = "dashboard", vp = {}, hrTab = "records", mailOpen = false, booting = true;

const pad = n => String(n).padStart(2, "0");
const iso = d => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
const todayStr = () => iso(new Date());
const dstr = off => { const d = new Date(); d.setDate(d.getDate() + off); return iso(d); };
const nowTs = () => Date.now();
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
/* Human dates: "20 Jul" (year only when it differs from the current year) */
const fmtDate = s => { const [y, m, d] = String(s).split("-").map(Number); return d + " " + MON[m - 1] + (y !== new Date().getFullYear() ? " " + y : ""); };
const fmtDMY = s => { if (!s) return "—"; const [y, m, d] = String(s).split("-"); return (d && m && y) ? `${d}/${m}/${y}` : s; };  // Day/Month/Year
/* "20 Jul" · "18–20 Jul" · "28 Jul – 2 Aug" */
const fmtRange = (s, e) => {
  if (!e || e === s) return fmtDate(s);
  const [ys, ms] = String(s).split("-").map(Number), [ye, me] = String(e).split("-").map(Number);
  if (ys === ye && ms === me) return Number(String(s).slice(8)) + "–" + fmtDate(e);
  return fmtDate(s) + " – " + fmtDate(e);
};
const fmtTs = ts => { const d = new Date(ts); return fmtDate(iso(d)) + ", " + pad(d.getHours()) + ":" + pad(d.getMinutes()); };
const fmtD = n => (n % 1 === 0 ? n : n.toFixed(1));

/* ============ Supabase → in-memory cache (renderers read db.* unchanged) ============ */
const mapEmp = r => ({ id: r.id, name: r.name, title: r.title || "", dept: r.dept || "", gender: r.gender,
  role: r.role, email: r.email, joinDate: r.join_date, approver1: r.approver1, approver2: r.approver2,
  empNo: r.emp_no || "", alias: r.alias || "", mobile: r.mobile || "", hasLogin: !!r.auth_user_id,
  twoLevel: r.two_level, annualBase: Number(r.annual_base), active: r.active, lastDay: r.last_working_day || null });
const mapType = r => ({ code: r.code, en: r.name_en, zh: r.name_zh, mc: r.requires_attachment,
  gender: r.gender_eligibility, noDeduct: r.no_deduct, days: Number(r.default_days),
  allowHalf: r.allow_half_day, sort: r.sort, note: r.note || "" });
// Numeric-with-default that keeps a real 0 (unlike `Number(x) || d`); blank/invalid → default.
const numOr = (v, d) => { const n = Number(v); return (v === "" || v == null || !Number.isFinite(n)) ? d : n; };
/* DB action codes → display strings the history/timeline renderers expect */
const mapAction = c => ({
  submitted: "Submitted", resubmitted: "Resubmitted",
  step_approved: "Approved (a level)", step_approved_overlap_ack: "Approved (overlap acknowledged)",
  approved: "Approved", approved_overlap_ack: "Approved (overlap acknowledged)",
  rejected: "Rejected", returned: "Returned", withdrawn: "Withdrawn", auto_approved: "Auto-approved",
  cancel_requested: "Cancellation requested", cancelled: "Cancellation confirmed", cancel_denied: "Cancellation declined"
}[c] || c);

async function loadAll() {
  // 按需知：HR 读整表（含 annual_base/join_date 等敏感列供 Console 编辑）；
  // 其余人只读目录视图（姓名/部门/职位/审批链等非敏感列）。

/* Working-day count (excludes weekends + SG public holidays; supports half days) */
function wdCount(start, end, sh, eh, phList) {
  const ph = phList || db.publicHolidays;
  const s = new Date(start + "T00:00:00"), e = new Date(end + "T00:00:00");
  if (!(s <= e)) return 0;
  const list = [];
  for (const d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const wd = d.getDay();
    if (wd !== 0 && wd !== 6 && !ph.includes(iso(d))) list.push(iso(d));
  }
  let n = list.length;
  if (sh && list[0] === start) n -= 0.5;
  if (eh && list[list.length - 1] === end) n -= 0.5;
  if (n <= 0 && list.length) n = 0.5;
  return n;
}
/* Working days (ISO strings) in a range, excluding weekends + SG public holidays */
function workingDaysList(start, end) {
  const ph = db.publicHolidays;
  const s = new Date(start + "T00:00:00"), e = new Date(end + "T00:00:00");
  const list = [];
  if (!(s <= e)) return list;
  for (const d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const wd = d.getDay();
    if (wd !== 0 && wd !== 6 && !ph.includes(iso(d))) list.push(iso(d));
  }
  return list;
}
/* Day count honouring a per-day half map { "YYYY-MM-DD": "am"|"pm" } */
function wdCountHalf(start, end, half) {
  const list = workingDaysList(start, end);
  let n = list.length;
  for (const ds of list) if (half && (half[ds] === "am" || half[ds] === "pm")) n -= 0.5;
  if (n <= 0 && list.length) n = 0.5;
  return n;
}

function halfSummary(a) {

  if (hd.length) return " · half: " + hd.map(x => fmtDate(x.d) + " " + String(x.part).toUpperCase()).join(", ");
  if (a.sh || a.eh) return (a.sh ? " · first day ½" : "") + (a.eh ? " · last day ½" : "");

function reasonEn(s) {
  return String(s || "")
    .replace(/^请假扣减$/, "Leave taken")
    .replace(/^销假返还$/, "Refunded — leave cancelled")
    .replace(/^(\d{4}) 年度配额$/, "$1 annual allowance")
    .replace(/^(\d{4}) 结转年假到期作废 \(expired carry-over\)$/, "$1 carry-over expired (unused)")
    .replace(/^(\d{4}) 年假超出结转上限\(([\d.]+)\)作废 \(excess forfeited\)$/, "$1 annual leave above the carry-over cap ($2) — forfeited");
}

async function submitApp(data, editId) {
  const { data: id, error } = await sb.rpc("submit_application", {
    p_type: data.type, p_start: data.start, p_end: data.end,
    p_reason: data.reason, p_attachment: data.att || null, p_resubmit_id: editId || null,
    p_half_days: data.halfDays || []
  });
  if (error) { rpcErr(error); return null; }
  await loadAll();
  const a = db.applications.find(x => x.id === id);
  return { id, auto: a && a.status === "approved" };
}

async function actOnStep(appId, action, comment, acked) {
  const { error } = await sb.rpc("act_on_step", { p_app: appId, p_action: action, p_comment: comment || null, p_ack: !!acked });
  if (error) { rpcErr(error); return false; }
  await loadAll();
  return true;
}

  const { error } = await sb.rpc("withdraw_application", { p_app: appId });
  if (error) { rpcErr(error); return false; }
  await loadAll(); return true;
}
async function requestCancel(appId) {
  const { error } = await sb.rpc("request_cancel", { p_app: appId });
  if (error) { rpcErr(error); return false; }

async function confirmCancel(appId, ok, comment) {

/* ============ Queries ============ */
function inbox(u) {
  const todo = db.applications.filter(a => a.status === "pending" && a.steps.length && a.steps[a.cur].approverId === u.id);
  const cancels = db.applications.filter(a => a.status === "cancel_requested" && a.steps.length && a.steps[0].approverId === u.id);
  return { todo, cancels, count: todo.length + cancels.length };
}
/* "Department" for the overlap warning = the applicant's immediate team:
   same-dept colleagues, teammates sharing the same approver, their approver,
   and their own direct reports (so a manager counts as part of the team). */
function conflictGroup(empId) {
  // A "department" for conflict purposes = people sharing the same dept field,
  // plus the person's own manager (the leader counts as a department member),
  // plus this person's own direct reports if they are a manager.
  // We deliberately do NOT group by "same approver1": at the top of the org
  // everyone reports directly to the Managing Director (Doris), and those
  // direct reports are heads of DIFFERENT departments — they are not one team.
  const e = emp(empId), ids = new Set();
  for (const x of db.employees) {
    if (x.id === empId || x.active === false) continue;
    if (x.dept === e.dept) ids.add(x.id);   // same department
    if (x.id === e.approver1) ids.add(x.id); // my manager (leader is in the dept)
    if (x.approver1 === empId) ids.add(x.id); // my direct reports (if I lead)
  }
  return ids;
}
function overlapConflicts(a) {
  const group = conflictGroup(a.empId);
  return db.applications.filter(x => x.id !== a.id && group.has(x.empId) &&
    ["pending", "approved", "cancel_requested"].includes(x.status) &&
    !(x.end < a.start || x.start > a.end));
}
function isApprover(u) { return u.role !== "employee" || db.employees.some(e => e.approver1 === u.id || e.approver2 === u.id); }
/* Attachment display: storage paths (contain "/") become View links; legacy names render as text */
function attLink(att) {
  if (!att) return "";
  const base = att.split("/").pop().replace(/^\d+_/, "");
  return att.includes("/")
    ? `📎 <a data-act="viewatt" data-path="${esc(att)}" style="cursor:pointer">${esc(base)} — view</a>`
    : `📎 ${esc(att)}`;
}
function myDecisions(u) {
  // Sourced from the immutable event log (not from steps, which are rebuilt on
  // resubmission) so history survives amend-and-resubmit cycles.
  const isDecision = act => act.startsWith("Approved") ||
    act === "Rejected" || act === "Returned" ||
    act === "Cancellation confirmed" || act === "Cancellation declined";
  return db.events
    .filter(v => v.actor === u.id && isDecision(v.action))
    .map(v => ({ a: db.applications.find(x => x.id === v.appId), decision: v.action, comment: v.comment, ts: v.ts }))
    .filter(r => r.a)
    .sort((x, y) => y.ts - x.ts);
}

function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 2600); }

}
// Fetch a short-lived signed URL and show the attachment inline (image → preview, else a link).
async function hydrateAttPreview() {
  const el = document.getElementById("attprev");
  if (!el) return;
  const path = el.dataset.path, name = el.dataset.name || "attachment";
  const isImg = /\.(jpe?g|png|heic|heif|webp|gif)$/i.test(name);
  const { data, error } = await sb.storage.from("attachments").createSignedUrl(path, 120);
  if (error || !data?.signedUrl) { el.innerHTML = `📎 ${esc(name)} — <span class="meta">unable to load (no access or file missing)</span>`; return; }
  el.innerHTML = `<a data-act="viewatt" data-path="${esc(path)}" style="cursor:pointer">📎 ${esc(name)} — open${isImg ? " full size" : ""}</a>`
    + (isImg ? `<img src="${esc(data.signedUrl)}" alt="${esc(name)}" style="display:block;max-width:100%;max-height:340px;border-radius:8px;margin-top:8px;border:1px solid var(--line)">` : "");
}

/* ---- Apply ---- */
function vApply() {
  const editing = vp.editId ? db.applications.find(a => a.id === vp.editId) : null;
  const types = db.leaveTypes.filter(t => eligible(t, me)).sort((a, b) => a.sort - b.sort);
  const f = vp.form || (editing
    ? { type: editing.type, start: editing.start, end: editing.end, half: Object.fromEntries((editing.halfDays || []).map(x => [x.d, x.part])), reason: editing.reason, att: editing.att }
    : { type: "annual", start: dstr(1), end: dstr(1), half: {}, reason: "", att: "" });
  if (!f.half) f.half = {};
  vp.form = f;
  const t = lt(f.type), b = bal(me.id, f.type);
  // Half-day is only offered for types HR allows (fallback: annual + off-in-lieu pre-migration)
  const allowHalf = typeof t.allowHalf === "boolean" ? t.allowHalf : ["annual", "oil"].includes(t.code);
  const half = allowHalf ? f.half : {};
  const wdays = workingDaysList(f.start, f.end);
  const days = wdCountHalf(f.start, f.end, half);
  const over = !t.noDeduct && days > b.avail;
  const backdated = f.start < todayStr();
  // Per-year balance breakdown (the ledger is cumulative across years → filter to this year)
  const cyNum = new Date().getFullYear();
  const grantedCY = db.ledger.filter(l => l.empId === me.id && l.type === f.type && l.delta > 0 && new Date(l.ts).getFullYear() === cyNum).reduce((s, l) => s + l.delta, 0);
  const usedCY = db.applications.filter(a => a.empId === me.id && a.type === f.type && a.status === "approved" && String(a.start).slice(0, 4) === String(cyNum)).reduce((s, a) => s + a.days, 0);
  const carried = f.type === "annual" && db.annualCarry ? Number(db.annualCarry.carry_in) : 0;
  const curYear = todayStr().slice(0, 4);
  const yearEnd = curYear + "-12-31";
  const nextYearBlocked = (f.start || "").slice(0, 4) > curYear || (f.end || "").slice(0, 4) > curYear;
  return `
    <h2>${editing ? "Amend & resubmit" : "Apply for leave"}</h2>
    <p class="sub">${me.approver1 ? "On submit, an email goes to your approver: " + chainText(me) : "As Managing Director your leave is recorded automatically — HR is notified for the record."}</p>
    ${editing ? `<div class="callout warn" style="margin-bottom:14px">This application was returned: “${esc(lastReturnComment(editing))}”. Amend it and resubmit for approval.</div>` : ""}
    <div class="card" style="max-width:640px;margin:0 auto">
      <div class="field"><label>Leave type</label>
        <select data-f="type">${types.map(x => `<option value="${x.code}" ${x.code === f.type ? "selected" : ""}>${esc(x.en)}</option>`).join("")}</select>
        <span class="hint">${t.noDeduct
          ? (t.code === "unpaid"
              ? "Unpaid leave may result in a salary deduction, depending on your company's policy."
              : "Recorded for HR's records only — it doesn't use any leave balance.")
          : `Available Balance: <b>${fmtD(b.avail)}</b> days (Current Year: ${fmtD(grantedCY)}${carried > 0 ? " · Carried Forward: " + fmtD(carried) : ""} · Used: ${fmtD(usedCY)} · Pending: ${fmtD(b.pending)})`}</span>
      </div>
      <div class="frow">
        <div class="field"><label>Start date<span class="req">*</span></label><input type="date" data-f="start" value="${f.start}" max="${yearEnd}"></div>
        <div class="field"><label>End date<span class="req">*</span></label><input type="date" data-f="end" value="${f.end}" max="${yearEnd}"></div>
      </div>
      ${wdays.length && allowHalf ? `<div class="field"><label>Half days <span style="font-weight:400;color:var(--muted)">— optional</span></label>
        <div class="hint" style="margin:-2px 0 8px">By default, each selected day is counted as a full day. Change any day to Morning or Afternoon if you're taking only half a day.</div>
        <div class="hdlist">${wdays.map(ds => `<div class="hdrow"><span>${fmtDate(ds)} · ${new Date(ds + "T00:00:00").toLocaleDateString("en-SG", { weekday: "short" })}</span>
          <select data-f="half" data-d="${ds}">
            <option value="" ${!f.half[ds] ? "selected" : ""}>Full day</option>
            <option value="am" ${f.half[ds] === "am" ? "selected" : ""}>Morning only (AM)</option>
            <option value="pm" ${f.half[ds] === "pm" ? "selected" : ""}>Afternoon only (PM)</option>
          </select></div>`).join("")}</div></div>` : ""}
      <div class="callout acc" style="margin:12px 0">
        <b style="font-size:17px">${fmtD(days)}</b> working day${days === 1 ? "" : "s"} — weekends & Singapore public holidays excluded automatically
        ${backdated ? " · <b>Backdated</b> (start date is in the past — common for sick leave)" : ""}
      </div>
      ${over ? `<div class="callout warn" style="margin:0 0 12px">Insufficient balance: this needs ${fmtD(days)} day${days === 1 ? "" : "s"} but only ${fmtD(b.avail)} available</div>` : ""}

let submitting = false; // guards against double-click / slow-network duplicate submits
async function doSubmit() {
  const f = vp.form, t = lt(f.type);
  const allowHalf = typeof t.allowHalf === "boolean" ? t.allowHalf : ["annual", "oil"].includes(t.code);
  const wdays = workingDaysList(f.start, f.end);
  const half = allowHalf ? (f.half || {}) : {};
  const halfDays = wdays.filter(ds => half[ds]).map(ds => ({ d: ds, part: half[ds] }));
  const days = wdCountHalf(f.start, f.end, half);
  if (!f.reason.trim()) return toast("Please add a brief reason for your leave.");
  if (t.mc && !f.att) return toast("Please attach a photo or PDF of your MC for this leave type.");
  if (t.mc && f.att && !/\.(jpe?g|png|heic|heif|webp|gif|pdf)$/i.test(f.att)) return toast("Your MC needs to be a photo or a PDF.");
  const overlap = db.applications.some(a => a.empId === me.id && a.id !== vp.editId &&
    ["pending", "approved", "cancel_requested"].includes(a.status) && !(f.end < a.start || f.start > a.end));
  if (overlap) return toast("These dates overlap with an application you've already submitted.");
  if (submitting) return;               // a submit is already in flight — ignore the extra click
  submitting = true;
  const btn = document.querySelector('[data-act="submit"]'), label = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
  try {
    const editId = vp.editId;
    // Upload the attachment to private storage first; the application stores its path.
    let att = f.att || "", uploadedPath = "";
    if (f._file) {
      const safe = f._file.name.replace(/[^\w.\-]/g, "_");
      const path = me.id + "/" + Date.now() + "_" + safe;
      const { error: upErr } = await sb.storage.from("attachments").upload(path, f._file);
      if (upErr) return rpcErr(upErr);
      att = path; uploadedPath = path;
    }
    const res = await submitApp({ type: f.type, start: f.start, end: f.end, halfDays, days, reason: f.reason.trim(), att, backdated: f.start < todayStr() }, editId);
    // On failure, delete the just-uploaded file so a rejected submit doesn't orphan storage.
    if (!res) { if (uploadedPath) await sb.storage.from("attachments").remove([uploadedPath]); return; }
    const approverName = me.approver1 ? (emp(me.approver1) || {}).name || "your approver" : "";
    vp = {}; view = "myapps"; render();
    toast(res.auto ? "Your leave has been recorded and approved automatically. HR has been notified." : "Your application has been submitted and sent to " + approverName + " for approval.");
  } finally {
    submitting = false;
    if (btn && document.body.contains(btn)) { btn.disabled = false; btn.textContent = label; }
  }
}

/* Annual-leave calculation: joined this year → pro-rated by remaining months;
   otherwise base + 1 day per additional full year of service. */
function annualCalc(joinDate, base) {
  const y = new Date().getFullYear();
  const jy = Number(String(joinDate).slice(0, 4)) || y, jm = Number(String(joinDate).slice(5, 7)) || 1;
  if (jy >= y) {
    const monthsLeft = 12 - jm + 1;
    let days = Math.ceil(base * monthsLeft / 12 * 2) / 2;
    const cap = db && db.org ? db.org.prorateCap : null;
    const capped = (cap != null && cap !== "" && days > Number(cap));
    if (capped) days = Number(cap);
    return { days, note: `pro-rated for their start date — ${fmtD(days)} day${days === 1 ? "" : "s"} this year${capped ? ` (capped at ${fmtD(Number(cap))})` : ""}` };
  }
  const extra = Math.max(0, y - jy - 1);
  return { days: base + extra, note: `${base} base + ${extra} for ${y - jy} year${(y - jy) === 1 ? "" : "s"} of service = ${fmtD(base + extra)} day${(base + extra) === 1 ? "" : "s"}` };
}
function empMatches(e, q, deptF) {
  if (deptF && deptF !== "all" && e.dept !== deptF) return false;
  if (!q) return true;
  const s = q.toLowerCase();
  return [e.name, e.email, e.title || "", e.dept].some(v => String(v).toLowerCase().includes(s));
}
function hrEmployees() {
  const former = db.employees.filter(e => e.active === false);
  const q = vp.empSearch || "", deptF = vp.empDept || "all";
  const shown = activeEmps().filter(e => empMatches(e, q, deptF));
  const deptCount = d => db.employees.filter(e => e.active !== false && e.dept === d).length;
  return `<div class="card">

/* CSV download helper (Excel-safe: BOM + quoted fields) */
function csvDownload(filename, rows) {
  const csv = rows.map(r => r.map(v => { const s = String(v ?? ""); return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; }).join(",")).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" }));
  a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}

      if (!f.delta) return toast("Please enter a number of days that isn't zero.");
      const { error } = await sb.from("leave_ledger").insert({ emp_id: f.empId, leave_type: f.type,
        delta_days: Number(f.delta), reason: "Manual adjustment: " + f.reason.trim(), created_by: me.id });
      if (error) return rpcErr(error);
      vp.ledForm = { empId: f.empId, type: f.type, delta: 1, reason: "" }; await reload(); toast("Adjustment saved.");
      break;
    }
    case "phadd": {
      const d = document.getElementById("newph")?.value;
      const nm = (document.getElementById("newphname")?.value || "").trim();
      if (!d) return toast("Pick a date first");
      if (!nm) return toast("Please type the holiday's name (e.g. Vesak Day)");
      if (db.publicHolidays.includes(d)) return toast("Already in the list");
      const { error } = await sb.from("public_holidays").insert({ holiday: d, name: nm, source: "manual" });
      if (error) return rpcErr(error);
      await reload(); toast("Holiday added");
      break;
    }
    case "phedit": { vp.phModal = { orig: el.dataset.d, date: el.dataset.d, name: el.dataset.n || "" }; render(); break; }
    case "phsave": {
      const m = vp.phModal || {};
      const d = document.getElementById("ph-date")?.value;
      const nm = (document.getElementById("ph-name")?.value || "").trim();
      if (!d) return toast("Pick a date first");
      if (!nm) return toast("Please type the holiday's name");
      if (d !== m.orig && db.publicHolidays.includes(d)) return toast("That date is already in the list");
      if (m.orig && d === m.orig) {
        const { error } = await sb.from("public_holidays").update({ name: nm, source: "manual", synced_at: null }).eq("holiday", m.orig);
        if (error) return rpcErr(error);
      } else {
        if (m.orig) { const { error: de } = await sb.from("public_holidays").delete().eq("holiday", m.orig); if (de) return rpcErr(de); }
        const { error } = await sb.from("public_holidays").insert({ holiday: d, name: nm, source: "manual" });
        if (error) return rpcErr(error);
      }
      delete vp.phModal; await reload(); toast(m.orig ? "Holiday updated" : "Holiday added");
      break;
    }
    case "balcsv": {
      const types = db.leaveTypes.filter(t => !t.noDeduct).sort((a, b) => a.sort - b.sort);
      const rows = [["Employee", "Team", ...types.flatMap(t => [t.en + " left", t.en + " entitled"])]];
      for (const e of activeEmps()) rows.push([e.name, e.dept, ...types.flatMap(t => { if (!eligible(t, e)) return ["n/a", "n/a"]; const b = bal(e.id, t.code); return [fmtD(b.avail), fmtD(b.granted)]; })]);
      csvDownload("leave-balances-" + todayStr() + ".csv", rows);
      toast("Balances exported"); break;
    }
    case "reccsv": {
      const rows = [["Employee", "Team", "Leave type", "Start", "End", "Days", "Status", "Reason", "Submitted"]];
      const fset = vp.stFilter || "all", q = (vp.recSearch || "").toLowerCase();
      for (const a of db.applications) {
        const e = emp(a.empId); if (!e) continue;
        if (fset !== "all" && a.status !== fset) continue;
        if (q && !e.name.toLowerCase().includes(q) && !e.email.toLowerCase().includes(q)) continue;
        rows.push([e.name, e.dept, (lt(a.type) || {}).en || a.type, a.start, a.end, fmtD(a.days), stName(a.status), a.reason, fmtTs(a.createdAt)]);
      }
      csvDownload("leave-records-" + todayStr() + ".csv", rows);
      toast("Records exported"); break;
    }
    case "grantask": vp.grantConfirm = true; render(); break;
    case "grantcancel": delete vp.grantConfirm; render(); break;
    case "grantgo": {
      const yr = numOr(vp.grantYear, new Date().getFullYear());
      const { data, error } = await sb.rpc("grant_annual_entitlements", { p_year: yr });
      if (error) return rpcErr(error);
      delete vp.grantConfirm; await reload(); toast(`${yr} leave allowances have been added for everyone.`);
      break;
    }
    case "phdel": { const { error } = await sb.from("public_holidays").delete().eq("holiday", el.dataset.d); if (error) return rpcErr(error); await reload(); toast("Holiday removed"); break; }
    case "decide": {
      const d = el.dataset.d;
      const cm = (document.getElementById("cm-" + id) || {}).value || "";
      if ((d === "reject" || d === "return") && !cm.trim()) return toast(d === "reject" ? "A reason is required when rejecting" : "Please say what needs to be added before returning");
      const ackEl = document.getElementById("ack-" + id);
      if (await actOnStep(id, d, cm.trim(), !!(ackEl && ackEl.checked))) {
        render();  // refresh the page so the card leaves the waiting list right away
        toast(d === "approve" ? "✅ Approved — moved down to your Decision history" : d === "reject" ? "Rejected — the employee has been notified" : "Returned — the employee has been notified");
      }
      break;
    }
  }
});

document.addEventListener("change", async ev => {
  const el = ev.target;
  if (el.dataset.act === "ackbox") {
    const btn = document.querySelector(`[data-act="decide"][data-d="approve"][data-id="${el.dataset.id}"]`);
    if (btn) btn.disabled = !el.checked;
    return;
  }
  if (el.dataset.act === "grantyear") { vp.grantYear = numOr(el.value, new Date().getFullYear()); render(); return; }
  if (el.dataset.act === "empf") {
    const id = el.dataset.id, f = el.dataset.f;
    if (f === "annualBase") stageEmp(id, "annualBase", numOr(el.value, 14));
    else if (f === "approver1") { stageEmp(id, "approver1", el.value || null); if (!el.value) stageEmp(id, "approver2", null); }
    else if (f === "approver2") stageEmp(id, "approver2", el.value || null);
    render(); return;
  }
  if (el.dataset.act === "typedays") { stageType(el.dataset.c, "days", numOr(el.value, 0)); render(); return; }
  if (el.dataset.act === "typehalf") {
    if (!db.ltHalf) { el.checked = !el.checked; return toast("Please run the latest database update (migration v8) first to use half-day settings."); }
    stageType(el.dataset.c, "half", el.checked); render(); return;
  }
  if (el.dataset.act === "typeattach") { stageType(el.dataset.c, "mc", el.checked); render(); return; }
  // Company settings now save via an explicit "Save changes" button (data-act="orgsave").
  if (el.dataset.act === "deptname") {
    const oldName = el.dataset.old, newName = el.value.trim();
    if (!newName) { el.value = oldName; return toast("Team name cannot be empty"); }
    if (newName === oldName) return;
    if (db.departments.some(d => d !== oldName && d.toLowerCase() === newName.toLowerCase())) { el.value = oldName; return toast("Another team already has this name"); }
    // FK on update cascade updates every member's dept automatically
    const { error } = await sb.from("departments").update({ name: newName }).eq("name", oldName);
    if (error) { el.value = oldName; return rpcErr(error); }
    vp.teamsOpen = true; await reload(); toast(`Team renamed to "${newName}" — members updated`);
    return;
  }
  const f = el.dataset.f;
  if (!f) return;
  if (f === "stFilter") { vp.stFilter = el.value; render(); return; }
  if (f === "empDept") { vp.empDept = el.value; render(); return; }
  if (f.startsWith("led.")) { vp.ledForm[f.slice(4)] = el.type === "number" ? Number(el.value) : el.value; return; }
  if (f.startsWith("org.")) { stageOrg(f.slice(4), el.value); render(); return; }
  if (f.startsWith("em.") && vp.empModal) {
    const k = f.slice(3);
    vp.empModal.form[k] = el.type === "checkbox" ? el.checked : el.value;
    if (k === "approver1" && !el.value) { vp.empModal.form.twoLevel = false; vp.empModal.form.approver2 = ""; } // auto-approve ⇒ no 2-level
    if (["joinDate", "twoLevel", "approver1", "approver2", "dept"].includes(k)) render(); // refresh pro-rate preview / dependent selects / new-team field
    return;
  }
  if (f.startsWith("oil.") && vp.oilModal) { vp.oilModal[f.slice(4)] = el.type === "number" ? Number(el.value) : el.value; return; }
  if (f.startsWith("off.") && vp.offModal) { vp.offModal[f.slice(4)] = el.value; return; }
  if (view === "apply" && vp.form) {
    if (f === "reason") { vp.form.reason = el.value; return; } // synced live via input; skipping re-render here keeps the submit click from being swallowed
    if (f === "attfile") {
      const file = el.files && el.files[0];
      vp.form._file = file || null;               // real File object, uploaded on submit
      vp.form.att = file ? file.name : "";
      render(); return;
    }
    if (f === "half") {
      const ds = el.dataset.d;
      if (!vp.form.half) vp.form.half = {};
      if (el.value) vp.form.half[ds] = el.value; else delete vp.form.half[ds];
      render(); return;
    }
    vp.form[f] = el.value;
    if (f === "start" && vp.form.end < vp.form.start) vp.form.end = vp.form.start;
    render();
  }
});
// <details> open state is lost on re-render; remember the Teams panel's state
document.addEventListener("toggle", ev => {
  if (ev.target.hasAttribute && ev.target.hasAttribute("data-teams")) vp.teamsOpen = ev.target.open;
}, true);

document.addEventListener("input", ev => {
  const el = ev.target;
  if (view === "apply" && vp.form && el.dataset.f === "reason") vp.form.reason = el.value;
  const f = el.dataset.f || "";
  const liveSearch = { empSearch: "empsearch", recSearch: "recsearch", calSearch: "calsearch" };
  if (liveSearch[f]) {
    // Live filter; re-render then restore focus/caret so typing isn't interrupted
    vp[f] = el.value; render();
    const s = document.getElementById(liveSearch[f]);
    if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
    return;
  }
  // Sync modal text fields live so the save click (which blurs the field) never loses input
  if (vp.empModal && f.startsWith("em.") && el.type !== "checkbox") {
    vp.empModal.form[f.slice(3)] = el.value;
    if (f === "em.email") vp.empModal.emailTouched = true;
    if (f === "em.name" && vp.empModal.mode === "add" && !vp.empModal.emailTouched) {
      // Auto-suggest email from the name (ASCII only — Chinese names are typed manually)
      const slug = el.value.toLowerCase().replace(/[^a-z0-9]/g, "");
      const auto = slug ? slug + "@" + (db.org?.emailDomain || "company.com") : "";
      vp.empModal.form.email = auto;
      const em = document.querySelector('input[data-f="em.email"]');
      if (em) em.value = auto;
    }
  }
  if (vp.oilModal && f.startsWith("oil.")) vp.oilModal[f.slice(4)] = el.type === "number" ? Number(el.value) : el.value;
  if (vp.offModal && f.startsWith("off.") && el.type !== "radio") vp.offModal[f.slice(4)] = el.value;
});

/* ============ Boot ============ */
function bootScreen() {
  $app().innerHTML = `<div class="login"><div class="loginbox"><h1>LeaveDesk</h1><p class="tag">Loading…</p></div></div>`;
}
async function boot() {
  bootScreen();
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { await afterAuth(); return; }
  } catch (e) { /* offline / first load — fall through to the sign-in page */ }
  me = null; render();
}
if (typeof supabase === "undefined") {
  document.getElementById("app").innerHTML = '<div class="login"><div class="loginbox"><h1>LeaveDesk</h1><p class="tag">Could not load a required library. Check your internet connection and refresh.</p></div></div>';
} else {
  boot();
}
</script>
</body>
</html>
